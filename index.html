<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HR OneFlow | 인사 운영 시스템</title>
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <div id="authRoot"></div>

    <div class="app-shell hidden" id="appShell">
      <aside class="sidebar">
        <section class="brand">
          <strong>HR OneFlow</strong>
          <span>인사 운영 시스템</span>
        </section>

        <nav class="nav" id="navMenu" aria-label="주 메뉴"></nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <div class="page-heading">
            <span class="breadcrumb" id="pageBreadcrumb">대시보드</span>
            <h1 id="pageTitle">대시보드</h1>
            <p id="pageDescription">오늘 처리해야 할 인사 운영 현황을 확인합니다.</p>
          </div>
          <div class="top-actions">
            <button type="button" class="button ghost" id="userMenuButton">사용자</button>
            <button type="button" class="button ghost" id="exportButton">내보내기</button>
            <button type="button" class="button primary" id="primaryActionButton">등록</button>
          </div>
        </header>

        <section class="tabbar" id="tabBar"></section>
        <section class="content" id="appContent"></section>
      </main>
    </div>

    <div class="modal-root hidden" id="modalRoot"></div>
    <div class="toast-root" id="toastRoot"></div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="./app.bundle.js"></script>
  </body>
</html>
